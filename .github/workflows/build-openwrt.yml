name: Build OpenWrt with SSR-Plus and Trafficctl

on:
  push:
    branches: [ master ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  REPO_URL: https://github.com/coolsnowwolf/lede.git
  REPO_BRANCH: master
  TARGET: x86_64
  FEED_CONF: feeds.conf.default

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      # 先 checkout openwrt-build 仓库（含自定义 package/）
      - name: Checkout openwrt-build (custom packages)
        uses: actions/checkout@v4
        with:
          path: openwrt-build

      - name: Checkout lede source
        uses: actions/checkout@v4
        with:
          repository: coolsnowwolf/lede
          ref: master
          path: lede

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-distutils-extra rsync unzip zlib1g-dev \
            file wget subversion upx-ucl autoconf automake curl asciidoc libtool

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          df -h

      - name: Set JOBS
        # GHA runner 只有 7GB 内存，Go 编译 Xray 吃内存，限制并行度防 OOM
        run: echo "JOBS=2" >> $GITHUB_ENV

      - name: Add helloworld feed
        working-directory: lede
        run: |
          echo "src-git helloworld https://github.com/fw876/helloworld" >> $FEED_CONF

      - name: Add luci-app-trafficctl (本地包，含中文翻译)
        working-directory: lede
        run: |
          cp -r ../openwrt-build/package/luci-app-trafficctl package/

      - name: Update and install feeds
        working-directory: lede
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Force feeds to latest commit (fix outdated packages)
        working-directory: lede
        run: |
          # 强制所有 feed 拉取最新 commit，避免编译出老旧版本
          for f in feeds/*/; do
            if [ -d "$f/.git" ]; then
              feed_name=$(basename "$f")
              echo ">>> 更新 feed: $feed_name"
              (cd "$f" && git fetch origin 2>&1 && git reset --hard @{upstream} 2>&1) || \
              (cd "$f" && default_branch=$(git remote show origin 2>/dev/null | sed -n 's/.*HEAD branch: //p') && \
                git reset --hard "origin/${default_branch:-master}" 2>&1) || true
            fi
          done
          # 重新生成 feed 索引，pick up 最新包
          ./scripts/feeds install -a

      - name: Generate base .config
        working-directory: lede
        run: |
          if [ "$TARGET" = "x86_64" ]; then
            cat >> .config <<EOF
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_DEVICE_generic=y
          EOF
          else
            echo "请在此处添加其他目标平台的 base 配置"
            exit 1
          fi
          make defconfig

      - name: Enable required packages (SSR-Plus, Trafficctl, i18n)
        working-directory: lede
        run: |
          # SSR-Plus 相关
          echo "CONFIG_PACKAGE_luci-app-ssr-plus=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Iptables_Transparent_Proxy=y" >> .config
          echo "# CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Nftables_Transparent_Proxy is not set" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Xray=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_ChinaDNS_NG=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_MosDNS=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Shadow_TLS=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Kcptun=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_NaiveProxy=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Shadowsocks_Simple_Obfs=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Shadowsocks_V2ray_Plugin=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_ShadowsocksR_Libev_Client=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_ShadowsocksR_Libev_Server=y" >> .config

          # 启用 trafficctl 及其中文语言包
          # i18n 包由 LuCI 构建系统从 po/zh-cn/ 自动生成，包名格式：luci-i18n-<PKG_NAME>-<lang>
          echo "CONFIG_PACKAGE_luci-app-trafficctl=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-luci-app-trafficctl-zh-cn=y" >> .config

          # 启用 https-dns-proxy 及其中文语言包
          # 显式选中 https-dns-proxy + luci-app + i18n 确保版本一致
          echo "CONFIG_PACKAGE_https-dns-proxy=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-https-dns-proxy=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-https-dns-proxy-zh-cn=y" >> .config

          # === 游戏网络优化内核模块 ===
          # TCP BBR 拥塞控制
          echo "CONFIG_PACKAGE_kmod-tcp-bbr=y" >> .config
          # Fullcone NAT (游戏 UDP NAT 穿透)
          echo "CONFIG_PACKAGE_iptables-mod-fullconenat=y" >> .config

          make defconfig

      - name: Apply gaming optimization files overlay
        working-directory: lede
        run: |
          # 将 openwrt-build/files/ 中的配置文件覆盖到固件 rootfs
          # OpenWrt 构建系统会在打包时将 files/ 目录内容合并到根文件系统
          if [ -d ../openwrt-build/files ]; then
            cp -r ../openwrt-build/files ./
            echo "Gaming optimization files copied to lede/files/"
            find files/ -type f | sort
          else
            echo "No files/ directory found in openwrt-build"
          fi

      - name: Download package sources
        working-directory: lede
        run: make download -j${{ env.JOBS }} V=s

      - name: Compile firmware
        working-directory: lede
        run: |
          # Gaming optimized build
          # files/ will be merged into rootfs during image generation
          make -j${{ env.JOBS }} V=s

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86-64-ssrplus
          path: lede/bin/targets/x86/64/*.img.gz
