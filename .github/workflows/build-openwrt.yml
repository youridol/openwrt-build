name: Build OpenWrt with SSR-Plus and Trafficctl

on:
  push:
    branches: [ master ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  REPO_URL: https://github.com/coolsnowwolf/lede.git
  REPO_BRANCH: master
  TARGET: x86_64
  FEED_CONF: feeds.conf.default

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      # 先 checkout openwrt-build 仓库（含自定义 package/）
      - name: Checkout openwrt-build (custom packages)
        uses: actions/checkout@v4
        with:
          path: openwrt-build

      - name: Checkout lede source
        uses: actions/checkout@v4
        with:
          repository: coolsnowwolf/lede
          ref: master
          path: lede

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-distutils-extra rsync unzip zlib1g-dev \
            file wget subversion upx-ucl autoconf automake curl asciidoc libtool

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          df -h

      - name: Set JOBS
        # GHA runner 只有 7GB 内存，Go 编译 Xray 吃内存，限制并行度防 OOM
        run: echo "JOBS=2" >> $GITHUB_ENV

      - name: Add helloworld feed
        working-directory: lede
        run: |
          echo "src-git helloworld https://github.com/fw876/helloworld" >> $FEED_CONF

      - name: Add luci-app-trafficctl and i18n package
        working-directory: lede
        run: |
          git clone --depth 1 https://github.com/YusDyr/luci-app-trafficctl.git /tmp/luci-app-trafficctl
          cp -r /tmp/luci-app-trafficctl/luci-app-trafficctl package/luci-app-trafficctl
          # 中文语言包来自 openwrt-build 仓库的 package/ 目录
          cp -r ../openwrt-build/package/luci-i18n-trafficctl-zh-cn package/

      - name: Update and install feeds
        working-directory: lede
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ==================== 编译中文语言包 .lmo ==================== 
      # po2lmo 依赖 lmo.c（sfh_hash），但 lmo.c 又依赖 bison 生成的 plural_formula.h
      # 自包含方式：提取 sfh_hash 并 #include po2lmo.c，一步到位
      - name: Compile i18n .lmo
        working-directory: lede
        run: |
          cat > /tmp/po2lmo_selfcontained.c << 'CEOF'
          #include <stdio.h>
          #include <stdlib.h>
          #include <stdint.h>
          #include <string.h>
          #include <fcntl.h>
          #include <sys/stat.h>
          #include <sys/mman.h>
          #include <arpa/inet.h>
          #include <unistd.h>
          #include <errno.h>
          #include <fnmatch.h>
          #include <dirent.h>
          #include <ctype.h>
          #include <limits.h>

          /* sfh_hash from lib/lmo.c (self-contained, no plural deps needed) */
          uint32_t sfh_hash(const char *data, size_t len, uint32_t init)
          {
              uint32_t hash = init + len;
              uint32_t tmp;
              int rem;

              if (len <= 0 || data == NULL) return 0;

              rem = len & 3;
              len >>= 2;

              for (; len > 0; len--)
              {
                  hash += *(const uint16_t *)data;
                  tmp = (*(const uint16_t *)(data + 2) << 11) ^ hash;
                  hash = (hash << 16) ^ tmp;
                  data += 4;
                  hash += hash >> 11;
              }

              switch (rem)
              {
                  case 3:
                      hash += *(const uint16_t *)data;
                      hash ^= hash << 16;
                      hash ^= ((signed char)data[sizeof(uint16_t)]) << 18;
                      hash += hash >> 11;
                      break;
                  case 2:
                      hash += *(const uint16_t *)data;
                      hash ^= hash << 11;
                      hash += hash >> 17;
                      break;
                  case 1:
                      hash += (signed char)*data;
                      hash ^= hash << 10;
                      hash += hash >> 1;
                      break;
              }

              hash ^= hash << 3;
              hash += hash >> 5;
              hash ^= hash << 4;
              hash += hash >> 17;
              hash ^= hash << 25;
              hash += hash >> 6;

              return hash;
          }

          /* include po2lmo.c from luci feed (uses #include "lib/lmo.h" but we provide sfh_hash above) */
          #include "feeds/luci/modules/luci-base/src/po2lmo.c"
          CEOF

          gcc -O2 -o /tmp/po2lmo -I. /tmp/po2lmo_selfcontained.c
          /tmp/po2lmo package/luci-i18n-trafficctl-zh-cn/src/trafficctl.zh-cn.po package/luci-i18n-trafficctl-zh-cn/src/trafficctl.zh-cn.lmo

      - name: Generate base .config
        working-directory: lede
        run: |
          if [ "$TARGET" = "x86_64" ]; then
            cat >> .config <<EOF
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_DEVICE_generic=y
          EOF
          else
            echo "请在此处添加其他目标平台的 base 配置"
            exit 1
          fi
          make defconfig

      - name: Enable required packages (SSR-Plus, Trafficctl, i18n)
        working-directory: lede
        run: |
          # SSR-Plus 相关
          echo "CONFIG_PACKAGE_luci-app-ssr-plus=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Iptables_Transparent_Proxy=y" >> .config
          echo "# CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Nftables_Transparent_Proxy is not set" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Xray=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_ChinaDNS_NG=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_MosDNS=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Shadow_TLS=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Kcptun=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_NaiveProxy=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Shadowsocks_Simple_Obfs=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Shadowsocks_V2ray_Plugin=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_ShadowsocksR_Libev_Client=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_ShadowsocksR_Libev_Server=y" >> .config

          # 启用 trafficctl 及其中文语言包
          echo "CONFIG_PACKAGE_luci-app-trafficctl=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-trafficctl-zh-cn=y" >> .config

          make defconfig

      - name: Download package sources
        working-directory: lede
        run: make download -j${{ env.JOBS }} V=s

      - name: Compile firmware
        working-directory: lede
        run: make -j${{ env.JOBS }} V=s

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86-64-ssrplus
          path: lede/bin/targets/x86/64/*.img.gz
