# === Gaming Network Optimization (IPv4/IPv6 Dual-Stack) ===
# Applied at every boot via sysctl -p

# --- TCP Congestion Control ---
net.ipv4.tcp_congestion_control = bbr
net.ipv4.tcp_slow_start_after_idle = 0

# --- TCP Low-Latency Tuning ---
net.ipv4.tcp_timestamps = 0
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_notsent_lowat = 131072
net.ipv4.tcp_keepalive_time = 60
net.ipv4.tcp_wmem = 4096 32768 4194304

# --- UDP Buffer Tuning (gaming) ---
net.core.rmem_default = 262144
net.core.wmem_default = 262144

# --- Conntrack UDP Timeout (fast stale cleanup) ---
net.netfilter.nf_conntrack_udp_timeout = 30
net.netfilter.nf_conntrack_udp_timeout_stream = 60

# --- NAPI / Packet Processing ---
net.core.netdev_budget = 600

# --- RPS Flow Steering ---
net.core.rps_sock_flow_entries = 32768

# --- Socket Backlog ---
net.core.somaxconn = 8192

# --- IPv6 Dual-Stack Gaming ---
# DHCPv6-PD /56 + Pure SLAAC → 全球公网 IPv6
net.ipv6.conf.all.forwarding = 1
net.ipv6.conf.pppoe-wan.accept_ra = 1
net.ipv6.conf.br-lan.forwarding = 1
net.ipv6.conf.all.hop_limit = 64
net.ipv6.route.max_size = 16384
net.ipv6.neigh.default.gc_thresh1 = 1024
net.ipv6.neigh.default.gc_thresh2 = 2048
net.ipv6.neigh.default.gc_thresh3 = 4096

# --- IPv6 DAD off: faster SLAAC acquisition ---
# 路由器侧无其他 IPv6 路由器, 跳过 DAD 节省 ~1s
net.ipv6.conf.br-lan.dad_transmits = 0
net.ipv6.conf.br-lan.accept_dad = 0

# --- Bufferbloat Prevention ---
# fq_codel: 公平队列 + 主动队列管理, 防 TCP 下载阻塞 UDP 游戏流量
net.core.default_qdisc = fq_codel

# --- Backlog: Gaming Burst Tolerance (1000→5000) ---
# CS2 高 tick rate 每 7.8ms 发包, 缓冲区需容纳突发
net.core.netdev_max_backlog = 5000

# --- Low-Latency Socket Polling (kernel 6.12+) ---
# busy_read/busy_poll: 减少 recvfrom/sendto 上下文切换
# 50us = 低 CPU 开销 + 显著降低 UDP 延迟抖动
net.core.busy_read = 50
net.core.busy_poll = 50

# --- UDP Memory: CS2 High-Frequency Small Packets ---
# 单位 pages (4KB), 默认 87k/116k/174k → 256k/512k/1M
# 防止 CS2 持续 128 tick 发包触发 UDP 缓冲区满丢包
net.ipv4.udp_mem = 65536 131072 262144

# --- TCP rmem: Complement tcp_wmem for Steam Downloads ---
net.ipv4.tcp_rmem = 4096 131072 6291456

# --- IPv4 Neighbor Table: Prevent P2P Overflow ---
# CS2 + Steam P2P 会产生大量 peer, 防止邻接表溢出
net.ipv4.neigh.default.gc_thresh1 = 1024
net.ipv4.neigh.default.gc_thresh2 = 2048
net.ipv4.neigh.default.gc_thresh3 = 4096

# --- Conntrack Scaling ---
# fullcone NAT + CS2 P2P → 高并发连接, 表容量翻倍
net.netfilter.nf_conntrack_max = 131072
